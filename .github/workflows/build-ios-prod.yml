name: Build iOS Production (EAS)

on:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: build-ios-prod-${{ github.ref }}
    cancel-in-progress: true

env:
    CI: '1'
    EXPO_NO_TELEMETRY: '1'

jobs:
    build-ios-prod:
        name: Build iOS production IPA
        runs-on: ubuntu-24.04
        timeout-minutes: 60
        env:
            EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: npm

            - name: Install dependencies
              run: npm ci --prefer-offline --no-audit

            - name: Build iOS via EAS
              run: npx eas-cli build --platform ios --profile production --non-interactive

            - name: Summarize iOS build
              run: |
                  {
                      echo "### iOS production build"
                  } >> "$GITHUB_STEP_SUMMARY"
